# ============================================================
# Session save / restore
# ============================================================
allow_remote_control yes
listen_on unix:@kitty-main.sock
startup_session none
single_instance yes
close_on_child_death no
shell_integration enabled
enabled_layouts splits,tall,fat,grid,horizontal,vertical,stack

# ============================================================
# Appearance
# ============================================================
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

cursor_shape          beam
cursor_beam_thickness 1.5
cursor_trail 3

background_opacity 0.92

window_padding_width 10
inactive_text_alpha   0.5
tab_bar_style powerline
confirm_os_window_close 0
shell fish

copy_on_select yes

# ============================================================
# Clipboard
# ============================================================
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+с copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+м paste_from_clipboard

# ============================================================
# Save session — Ctrl+S / Ctrl+Ы
# ============================================================
map ctrl+s launch --type=background /home/dima/.local/bin/kitty-save-session.sh
map ctrl+ы launch --type=background /home/dima/.local/bin/kitty-save-session.sh

# ============================================================
# Tabs
# ============================================================
map ctrl+h new_tab
map ctrl+р new_tab
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab

# ============================================================
# Windows (panes)
# ============================================================
# Ctrl+Shift+W — закрыть активную панель
# Ctrl+Shift+Q — закрыть таб
map ctrl+shift+w close_window
map ctrl+shift+ц close_window
map ctrl+shift+q close_tab
map ctrl+shift+й close_tab
map ctrl+s launch --type=background bash -c "~/.local/bin/kitty-save-session.sh"
map ctrl+ы launch --type=background bash -c "~/.local/bin/kitty-save-session.sh"

map ctrl+shift+enter launch --cwd=current

# Ctrl+Shift+Arrow → сплит в указанную сторону
# (новый pane появляется именно с той стороны, куда смотрит стрелка)
# В kitty: hsplit = новая панель СПРАВА, vsplit = новая панель СНИЗУ
map ctrl+shift+left  launch --location=vsplit --cwd=~
map ctrl+shift+right launch --location=vsplit --cwd=~
map ctrl+shift+up    launch --location=hsplit --cwd=~
map ctrl+shift+down  launch --location=hsplit --cwd=~

# ============================================================
# Pane navigation / layouts / resize
# ============================================================
map ctrl+shift+[ previous_window
map ctrl+shift+х previous_window
map ctrl+shift+] next_window
map ctrl+shift+ъ next_window
map ctrl+shift+и move_window_backward
map ctrl+shift+а move_window_forward

map ctrl+shift+l next_layout
map ctrl+shift+д next_layout

map ctrl+shift+r start_resizing_window
map ctrl+shift+к start_resizing_window

# ============================================================
# Bash / readline shortcuts on RU layout — те же control-коды что на EN
# ============================================================
map ctrl+ф send_text all \x01
map ctrl+и send_text all \x02
map ctrl+с send_text all \x03
map ctrl+в send_text all \x04
map ctrl+у send_text all \x05
map ctrl+а send_text all \x06
map ctrl+л send_text all \x0b
map ctrl+д send_text all \x0c
map ctrl+т send_text all \x0e
map ctrl+щ send_text all \x0f
map ctrl+з send_text all \x10
map ctrl+к send_text all \x12
map ctrl+г send_text all \x15
map ctrl+м send_text all \x16
map ctrl+ц send_text all \x17
map ctrl+н send_text all \x19
map ctrl+я send_text all \x1a
map ctrl+и send_text all \x02

# ============================================================
# Misc
# ============================================================
map ctrl+shift+h no_op

# Ctrl+Shift shortcuts — русская раскладка
map ctrl+shift+р send_text all \x15
map ctrl+shift+ф send_text all \x01
map ctrl+shift+у send_text all \x05
map ctrl+shift+л send_text all \x0b
map ctrl+shift+ц send_text all \x17
map ctrl+shift+д send_text all \x0c
map ctrl+shift+к send_text all \x12
map ctrl+shift+в send_text all \x04
map ctrl+shift+я send_text all \x1a
map ctrl+shift+т send_text all \x0e
map ctrl+shift+з send_text all \x10
map ctrl+shift+f2 launch --type=tab micro
filter_notification all

# BEGIN_KITTY_THEME
# Catppuccin-Macchiato
include current-theme.conf
# END_KITTY_THEME
